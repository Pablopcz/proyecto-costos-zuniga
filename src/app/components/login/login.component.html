<div class="login-container d-flex align-items-center justify-content-center vh-100 bg-dark">
  <div class="card p-4 shadow-lg text-center" style="width: 350px; border-radius: 20px;">
    
    <div class="mb-3">
      <h2 class="fw-bold"><span class="me-2">🔐</span>Acceso al Sistema</h2>
      <p class="text-muted small">Bienvenido, Pablo Cesar Zuniga</p>
    </div>

    <form>
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold">Usuario</label>
        <input type="text" 
               name="usuario"
               [(ngModel)]="credenciales.usuario" 
               class="form-control" 
               placeholder="Ingresa tu usuario">
      </div>

      <div class="mb-4 text-start">
        <label class="form-label small fw-bold">Contraseña</label>
        <input type="password" 
               name="password"
               [(ngModel)]="credenciales.password" 
               class="form-control" 
               placeholder="****">
      </div>

      <button type="button" 
              (click)="entrar()" 
              class="btn btn-primary w-100 fw-bold py-2 shadow-sm" 
              style="border-radius: 10px;">
        ENTRAR AL DASHBOARD
      </button>
    </form>

  </div>
</div>
